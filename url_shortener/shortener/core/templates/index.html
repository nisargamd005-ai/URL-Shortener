<!DOCTYPE html>
<html>
<head>
<title>URL Shortener</title>
</head>

<body>

<h2>Simple URL Shortener</h2>

<form method="POST">
{% csrf_token %}

<input type="text" name="url" placeholder="Paste your long URL" required>

<button type="submit">Shorten</button>

</form>

{% if short_url %}

<p>Your Short URL:</p>

<a href="{{short_url}}">{{short_url}}</a>

{% endif %}

</body>
</html>
