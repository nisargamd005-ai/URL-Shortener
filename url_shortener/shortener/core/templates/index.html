<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>URL Shortener</title>

<style>

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#667eea,#764ba2);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:0;
}

/* Main Card */

.container{
    background:white;
    padding:40px;
    border-radius:15px;
    box-shadow:0 15px 30px rgba(0,0,0,0.2);
    text-align:center;
    animation: fadeIn 1.5s ease;
}

/* Title */

h1{
    font-size:40px;
    margin-bottom:25px;
    color:#333;
}

/* Input Field */

input{
    padding:12px;
    width:300px;
    border:2px solid #ddd;
    border-radius:8px;
    outline:none;
    transition:0.3s;
}

input:focus{
    border-color:#667eea;
    transform:scale(1.03);
}

/* Button */

button{
    padding:12px 20px;
    margin-left:10px;
    border:none;
    border-radius:8px;
    background:#667eea;
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#5a67d8;
    transform:scale(1.05);
}

/* Short URL Result */

.result{
    margin-top:20px;
    font-size:18px;
    color:#444;
}

/* Animation */

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(-30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* Floating icon animation */

.link-icon{
    font-size:40px;
    animation: float 3s infinite ease-in-out;
}

@keyframes float{
    0%{ transform:translateY(0px);}
    50%{ transform:translateY(-10px);}
    100%{ transform:translateY(0px);}
}

</style>

</head>

<body>

<div class="container">

<div class="link-icon">🔗</div>

<h1>URL Shortener</h1>

<form method="POST">
{% csrf_token %}

<input type="text" name="url" placeholder="Enter your URL here" required>

<button type="submit">Shorten</button>

</form>

{% if short_url %}
<div class="result">
Short URL:
<a href="{{ short_url }}" target="_blank">{{ short_url }}</a>
</div>
{% endif %}

</div>

</body>
</html>
